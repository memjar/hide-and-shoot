<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hide & Shoot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: #e0e0e0; font-family: 'Space Grotesk', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
    #app { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
    .screen.active { display: flex; }
    h1 { font-size: 3rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 0.5rem; }
    h1 span { color: #D4AF37; }
    .subtitle { color: #888; font-size: 1rem; margin-bottom: 2rem; }
    input { background: #1a1a24; border: 2px solid #333; color: #e0e0e0; font-family: inherit; font-size: 1.2rem; padding: 0.8rem 1.2rem; border-radius: 4px; width: 280px; text-align: center; outline: none; }
    input:focus { border-color: #D4AF37; }
    input::placeholder { color: #555; }
    .btn { background: #D4AF37; color: #0a0a0f; font-family: inherit; font-weight: 700; font-size: 1.1rem; padding: 0.8rem 2rem; border: none; border-radius: 4px; cursor: pointer; margin: 0.5rem; min-width: 200px; }
    .btn:hover { background: #e5c04b; }
    .btn.secondary { background: #1a1a24; color: #D4AF37; border: 2px solid #D4AF37; }
    .btn.secondary:hover { background: #252530; }
    .room-code { font-size: 3rem; font-weight: 700; letter-spacing: 8px; color: #D4AF37; font-family: 'IBM Plex Mono', monospace; margin: 1rem 0; }
    .player-list { list-style: none; margin: 1rem 0; width: 300px; }
    .player-list li { padding: 0.5rem; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
    .player-list li .ready { color: #4ade80; }
    .player-list li .host { color: #D4AF37; font-size: 0.8rem; }
    .timer { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); font-size: 2rem; font-weight: 700; color: #D4AF37; z-index: 100; text-shadow: 0 0 20px rgba(212,175,55,0.5); }
    .phase-label { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); font-size: 1rem; color: #888; z-index: 100; text-transform: uppercase; letter-spacing: 4px; }
    .score-display { position: fixed; top: 20px; right: 20px; font-size: 1.2rem; color: #D4AF37; z-index: 100; }
    #game-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
    .paint-tools { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 100; background: rgba(10,10,15,0.9); padding: 12px; border-radius: 8px; border: 1px solid #333; }
    .color-btn { width: 36px; height: 36px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; }
    .color-btn.active { border-color: #fff; transform: scale(1.2); }
    .brush-size { width: 80px; accent-color: #D4AF37; }
    .caught-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.3); display: none; z-index: 200; pointer-events: none; }
    .caught-overlay.show { display: flex; align-items: center; justify-content: center; }
    .caught-overlay h2 { color: #fff; font-size: 3rem; text-shadow: 0 0 30px red; }
    .results-board { width: 400px; max-width: 90vw; }
    .results-board .row { display: flex; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid #222; }
    .results-board .row.seeker { color: #D4AF37; }
    .error-msg { color: #ef4444; margin-top: 0.5rem; font-size: 0.9rem; }
    .seeker-badge { position: fixed; top: 20px; left: 20px; background: #D4AF37; color: #0a0a0f; padding: 8px 16px; font-weight: 700; border-radius: 4px; z-index: 100; }
  </style>
</head>
<body>
<div id="app">
  <!-- MENU -->
  <div class="screen active" id="screen-menu">
    <h1>HIDE <span>&</span> SHOOT</h1>
    <p class="subtitle">Paint. Camouflage. Survive.</p>
    <input type="text" id="player-name" placeholder="Your name" maxlength="12" autocomplete="off">
    <div style="margin-top: 1rem;">
      <button class="btn" id="btn-create">CREATE GAME</button>
      <button class="btn secondary" id="btn-join-toggle">JOIN GAME</button>
    </div>
    <div id="join-section" style="display:none; margin-top:1rem;">
      <input type="text" id="room-code-input" placeholder="Room code" maxlength="4" style="text-transform:uppercase; letter-spacing:4px;">
      <br><button class="btn" id="btn-join" style="margin-top:0.5rem;">JOIN</button>
    </div>
    <p class="error-msg" id="menu-error"></p>
  </div>

  <!-- LOBBY -->
  <div class="screen" id="screen-lobby">
    <h1>LOBBY</h1>
    <div class="room-code" id="lobby-code"></div>
    <p class="subtitle">Share this code with your opponent</p>
    <ul class="player-list" id="lobby-players"></ul>
    <button class="btn" id="btn-ready">READY</button>
    <button class="btn" id="btn-start" style="display:none;">START GAME</button>
  </div>

  <!-- GAME -->
  <div class="screen" id="screen-game">
    <canvas id="game-canvas"></canvas>
    <div class="timer" id="timer"></div>
    <div class="phase-label" id="phase-label"></div>
    <div class="score-display" id="score-display"></div>
    <div class="seeker-badge" id="seeker-badge" style="display:none;">SEEKER</div>
    <div class="paint-tools" id="paint-tools" style="display:none;"></div>
    <div class="caught-overlay" id="caught-overlay"><h2>CAUGHT!</h2></div>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="screen-results">
    <h1>RESULTS</h1>
    <div class="results-board" id="results-board"></div>
    <p class="subtitle" style="margin-top:1rem;">Next round starting...</p>
  </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
